<form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="agt-contact-form-input" id="nextverse-contact-form">
	<div class="input-field">
		<label class="text-uppercase">Name</label>
		<input type="text" name="name" placeholder="e.g. Oliver Spiteri" required>
	</div>
	<div class="input-field">
		<label class="text-uppercase">Phone</label>
		<input type="tel" name="phone" placeholder="e.g. +1 877 217 8371">
	</div>
	<div class="input-field">
		<label class="text-uppercase">Email</label>
		<input type="email" name="email" placeholder="example@email.com" required>
	</div>
	<div class="input-field">
		<label class="text-uppercase">Subject</label>
		<input type="text" name="subject" placeholder="EX: Business">
	</div>
	<div class="input-field">
		<label class="text-uppercase">Message</label>
		<textarea name="message" rows="5" placeholder="Write your message here..." required></textarea>
	</div>
	<!-- Formspree honeypot spam prevention -->
	<input type="text" name="_gotcha" style="display:none">
	<input type="hidden" name="_subject" value="New message from Nextverse website">
	<button type="submit">Submit Now <i class="flaticon-right-up flaticon"></i></button>
	<div id="form-status" style="margin-top:15px; font-size:15px;"></div>
</form>
<script>
document.getElementById('nextverse-contact-form').addEventListener('submit', async function(e) {
	e.preventDefault();
	const btn = this.querySelector('button[type="submit"]');
	const status = document.getElementById('form-status');
	btn.textContent = 'Sending...';
	btn.disabled = true;
	try {
		const res = await fetch(this.action, {
			method: 'POST',
			body: new FormData(this),
			headers: { 'Accept': 'application/json' }
		});
		if (res.ok) {
			status.innerHTML = '<span style="color:#5587FF;">✓ Message sent! We\'ll be in touch soon.</span>';
			this.reset();
		} else {
			status.innerHTML = '<span style="color:red;">Something went wrong. Please email us directly.</span>';
		}
	} catch(err) {
		status.innerHTML = '<span style="color:red;">Connection error. Please try again.</span>';
	}
	btn.textContent = 'Submit Now';
	btn.disabled = false;
});
</script>
